name: Deploy site

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - 'spec/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Deployment is optional until the Cloudflare secrets exist; skip cleanly without them.
      - name: Check for Cloudflare secrets
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set - building only, skipping deploy."
          fi

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skill-set/site build

      # The CLI's schema URLs point here; the served bytes must equal the spec's exactly.
      - name: Verify schema endpoints are byte-identical to spec/
        run: |
          for schema in skill-set.schema.json skill-set.lock.schema.json; do
            cmp "spec/draft/$schema" "packages/site/dist/schema/draft/$schema"
          done

      - name: Deploy to Cloudflare
        if: steps.cloudflare.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/site
          command: deploy
