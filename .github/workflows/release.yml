name: Release

# Two-phase changesets flow: every push to main opens or refreshes a "Version Packages"
# PR from the pending changesets; merging that PR publishes @skill-set/cli to npm via
# OIDC trusted publishing with provenance.
#
# NOTE: The publish leg stays inert until the NPM_TRUSTED_PUBLISHING repository variable is
# set; until then the workflow only maintains the Version PR. One-time setup:
#   1. First publish of @skill-set/cli must happen outside this workflow (npm trusted
#      publishers attach to an existing package): `npm publish --access public` from
#      packages/cli after a build. That one release carries no provenance.
#   2. npmjs.com → package @skill-set/cli → Settings → Publishing access → add a
#      Trusted Publisher: GitHub Actions, owner "hcjmartin", repository "skill-set",
#      workflow filename "release.yml", environment "release". Then set publishing
#      access to require trusted publishing (disallows tokens).
#   3. GitHub repo → Settings → Actions → General → allow GitHub Actions to create
#      and approve pull requests (needed for the Version PR).
#   4. GitHub repo → Settings → Secrets and variables → Actions → Variables → add
#      repository variable NPM_TRUSTED_PUBLISHING = enabled.
# packages/site (private) and the skills-sets alias are excluded via .changeset/config.json;
# the alias is published manually on its own cadence.

permissions:
  contents: read

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'hcjmartin/skill-set'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # changesets/action pushes the version branch
      pull-requests: write # and opens/updates the Version PR
      id-token: write # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # changesets delegates publish to npm; OIDC trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@11.5.1
      - run: pnpm run build
      - name: Version PR or publish
        if: vars.NPM_TRUSTED_PUBLISHING == 'enabled'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Version PR only (publishing not yet configured)
        if: vars.NPM_TRUSTED_PUBLISHING != 'enabled'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
