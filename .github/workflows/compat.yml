name: Upstream compat

permissions:
  contents: read

# Live-network drift guard: installs a real skill through the pinned `npx skills`
# and asserts hash byte-parity. Scheduled rather than per-PR so green CI never depends
# on npm/GitHub availability; drift arrives with upstream releases, not our commits.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skill-set/cli exec vitest run test/compat.test.ts
        env:
          RUN_COMPAT: '1'
